<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Auth Header Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .password-group {
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            margin-top: 16px;
            cursor: pointer;
            color: #666;
            transition: color 0.3s;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            margin-bottom: 20px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .result-section {
            display: none;
            margin-top: 20px;
        }

        .result-section.show {
            display: block;
        }

        .result-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .result-box {
            background: #f5f5f5;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 16px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            color: #333;
            max-height: 150px;
            overflow-y: auto;
        }

        .btn-copy {
            background: #10b981;
            color: white;
        }

        .btn-copy:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }

        .btn-copy.copied {
            background: #3b82f6;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .notification.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Basic Auth Generator</h1>
        <p class="subtitle">Generate HTTP Basic Authentication headers</p>

        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username">
        </div>

        <div class="input-group password-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
            <span class="password-toggle" onclick="togglePassword()">
                <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>
        </div>

        <button class="btn btn-generate" onclick="generateAuth()">Generate Header</button>

        <div class="result-section" id="resultSection">
            <div class="result-label">Authorization Header:</div>
            <div class="result-box" id="resultBox"></div>
            <button class="btn btn-copy" onclick="copyToClipboard()">
                <span id="copyButtonText">Copy to Clipboard</span>
            </button>
        </div>
    </div>

    <div class="notification" id="notification">Copied to clipboard!</div>

    <script>
        let generatedHeader = '';
        let typingTimer;
        const typingDelay = 1000; // 1 second

        function generateAuth() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username || !password) {
                document.getElementById('resultSection').classList.remove('show');
                return;
            }

            // Create the credentials string
            const credentials = username + ':' + password;
            
            // Encode to Base64
            const encoded = btoa(credentials);
            
            // Create the full authorization header
            generatedHeader = 'Basic ' + encoded;

            // Display the result
            document.getElementById('resultBox').textContent = generatedHeader;
            document.getElementById('resultSection').classList.add('show');
        }

        function handleInput() {
            clearTimeout(typingTimer);
            typingTimer = setTimeout(generateAuth, typingDelay);
        }

        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                // Eye with slash (hidden state)
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                passwordInput.type = 'password';
                // Regular eye icon
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }

        function copyToClipboard() {
            if (!generatedHeader) return;

            navigator.clipboard.writeText(generatedHeader).then(() => {
                // Show notification
                const notification = document.getElementById('notification');
                notification.classList.add('show');

                // Update button text
                const button = document.getElementById('copyButtonText');
                button.textContent = 'Copied!';
                document.querySelector('.btn-copy').classList.add('copied');

                // Reset after 2 seconds
                setTimeout(() => {
                    notification.classList.remove('show');
                    button.textContent = 'Copy to Clipboard';
                    document.querySelector('.btn-copy').classList.remove('copied');
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy:', err);
                alert('Failed to copy to clipboard');
            });
        }

        // Allow Enter key to generate
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateAuth();
            }
        });

        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateAuth();
            }
        });

        // Auto-generate on input change
        document.getElementById('username').addEventListener('input', handleInput);
        document.getElementById('password').addEventListener('input', handleInput);
    </script>
</body>
</html>
